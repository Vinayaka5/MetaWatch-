<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MetaWatch — Data Quality Dashboard</title>

  <!-- Google Fonts: DM Sans + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Auto refresh every 60 seconds (live monitoring feel) -->
  <meta http-equiv="refresh" content="60">

  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>

  <!-- Sidebar Navigation -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
      <div>
        <div class="brand-name">MetaWatch</div>
        <div class="brand-sub">Data Observatory</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
        <i class="bi bi-grid-1x2"></i>
        <span>Overview</span>
      </a>
      <a href="/tables" class="nav-item {% if request.path == '/tables' %}active{% endif %}">
        <i class="bi bi-table"></i>
        <span>Table Health</span>
      </a>
      <a href="/tests" class="nav-item {% if request.path == '/tests' %}active{% endif %}">
        <i class="bi bi-clipboard2-check"></i>
        <span>Test Results</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="connection-pill" id="connStatus">
        <span class="conn-dot"></span>
        <span class="conn-text">Checking...</span>
      </div>
      <div class="sidebar-track">T-02 · Data Observability</div>
    </div>
  </div>

  <!-- Main content area -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Check connection status and update pill
    fetch('/api/status')
      .then(r => r.json())
      .then(data => {
        const pill = document.getElementById('connStatus');
        const text = pill.querySelector('.conn-text');
        const dot = pill.querySelector('.conn-dot');
        if (data.connected) {
          text.textContent = 'Live · OpenMetadata';
          pill.classList.add('connected');
        } else {
          text.textContent = 'Demo Mode';
          pill.classList.add('demo');
        }
      }).catch(() => {
        const pill = document.getElementById('connStatus');
        pill.querySelector('.conn-text').textContent = 'Demo Mode';
        pill.classList.add('demo');
      });

    // Highlight active nav
    document.querySelectorAll('.nav-item').forEach(item => {
      if (item.getAttribute('href') === window.location.pathname) {
        item.classList.add('active');
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
